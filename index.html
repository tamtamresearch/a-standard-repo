<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Standard Versions</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        h1 {
            font-size: 2.5em;
            color: white;
            margin-bottom: 0.3em;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        
        .subtitle {
            color: rgba(255,255,255,0.9);
            font-size: 1.1em;
            margin-bottom: 2em;
        }
        
        ul {
            list-style: none;
        }
        
        li {
            margin-bottom: 1em;
        }
        
        a {
            display: block;
            padding: 20px 25px;
            background: white;
            text-decoration: none;
            color: #2c3e50;
            border-radius: 8px;
            border: 2px solid transparent;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        a:hover {
            border-color: #667eea;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
            transform: translateY(-2px);
        }
        
        .version-title {
            font-size: 1.3em;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 0.3em;
        }
        
        .version-date {
            font-size: 0.9em;
            color: #95a5a6;
        }
        
        .latest {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }
        
        .latest .version-title,
        .latest .version-date {
            color: white;
        }
        
        .latest:hover {
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
        }
        
        footer {
            margin-top: 3em;
            padding-top: 2em;
            text-align: center;
            color: rgba(255,255,255,0.8);
            font-size: 0.9em;
        }
        
        footer a {
            display: inline;
            padding: 0;
            background: none;
            color: white;
            border: none;
            box-shadow: none;
            text-decoration: underline;
        }
        
        footer a:hover {
            transform: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📘 Standard Versions</h1>
        <p class="subtitle">Select a version to view the specification</p>
        
        <ul>
            <li>
                <a href="./latest/" class="latest">
                    <div class="version-title">Latest Version</div>
                    <div class="version-date">Always up-to-date</div>
                </a>
            </li>
            <li>
                <a href="./v3.0/">
                    <div class="version-title">Version 3.0</div>
                    <div class="version-date">Published 2026-04-02</div>
                </a>
            </li>
            <li>
                <a href="./v2.0/">
                    <div class="version-title">Version 2.0</div>
                    <div class="version-date">Published 2026-04-02</div>
                </a>
            </li>
            <li>
                <a href="./v1.0/">
                    <div class="version-title">Version 1.0</div>
                    <div class="version-date">Published 2026-04-02</div>
                </a>
            </li>
        </ul>
        
        <footer>
            Generated automatically by 
            <a href="https://github.com/tamtamresearch/a-standard-repo">a-standard-repo</a>
        </footer>
    </div>
</body>
</html>
